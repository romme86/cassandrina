# ============================================================
# Cassandrina — Production Docker Compose
# Tuned for Raspberry Pi 5 (8 GB RAM)
# ============================================================

services:
  # ── TimescaleDB ────────────────────────────────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cassandrina}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-cassandrina}
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./configs/timescaledb/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    deploy:
      resources:
        limits:
          memory: 1536M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cassandrina}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server /etc/redis/redis.conf
    volumes:
      - ./configs/redis/redis.conf:/etc/redis/redis.conf:ro
    ports:
      - "127.0.0.1:6379:6379"
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Next.js Webapp ─────────────────────────────────────────
  webapp:
    build:
      context: ..
      dockerfile: apps/webapp/Dockerfile
      args:
        NEXT_PUBLIC_BASE_PATH: ${WEBAPP_BASE_PATH:-}
        WEBAPP_EXTERNAL_URL: ${WEBAPP_EXTERNAL_URL:-http://localhost:3000}
    restart: unless-stopped
    env_file: ../.env
    environment:
      REDIS_URL: redis://redis:6379/0
      NEXT_PUBLIC_BASE_PATH: ${WEBAPP_BASE_PATH:-}
      WEBAPP_EXTERNAL_URL: ${WEBAPP_EXTERNAL_URL:-http://localhost:3000}
      NEXTAUTH_URL: ${WEBAPP_EXTERNAL_URL:-http://localhost:3000}
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000${WEBAPP_BASE_PATH:-}/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M

  rtl:
    image: shahanafarooqui/rtl:0.15.1-arm64v8
    restart: unless-stopped
    env_file: ../.env
    environment:
      RTL_PASSWORD: ${RTL_PASSWORD}
      RTL_NODE_LABEL: ${RTL_NODE_LABEL:-Cassandrina LND}
      RTL_PORT: 3000
      RTL_LND_REST_HOST: ${RTL_LND_REST_HOST:-}
      RTL_LND_REST_PORT: ${RTL_LND_REST_PORT:-${LND_PORT:-8080}}
    volumes:
      - rtl_data:/data
      - ./configs/rtl/entrypoint.sh:/entrypoint.sh:ro
      - ${RTL_LND_MAINNET_PATH:-/home/cassandrina/.lnd/data/chain/bitcoin/mainnet}:/lnd/mainnet:ro
      - ${RTL_LND_CONF_PATH:-/home/cassandrina/.lnd/lnd.conf}:/lnd/lnd.conf:ro
      - ${RTL_BITCOIND_CONF_PATH:-/mnt/bitcoin-ssd/umbrel/app-data/bitcoin/data/bitcoin/umbrel-bitcoin.conf}:/bitcoin/bitcoind.conf:ro
    command: ["/bin/sh", "/entrypoint.sh"]
    deploy:
      resources:
        limits:
          memory: 256M

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - ./configs/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "127.0.0.1:${NGINX_LOCAL_PORT:-8081}:80"
    depends_on:
      webapp:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 64M

  # ── Trading Bot (Python) ───────────────────────────────────
  trading-bot:
    build:
      context: ../services/trading-bot
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ../.env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Telegram Bot (Go) ──────────────────────────────────────
  telegram-bot:
    build:
      context: ../apps/telegram-bot
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ../.env
    environment:
      REDIS_URL: redis://redis:6379/0
      WEBAPP_API_URL: http://webapp:3000
    depends_on:
      redis:
        condition: service_healthy
      webapp:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 64M

volumes:
  timescaledb_data:
  rtl_data:
