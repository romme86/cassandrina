# ============================================================
# Cassandrina — Production Docker Compose
# Tuned for Raspberry Pi 5 (8 GB RAM)
# ============================================================

services:
  # ── TimescaleDB ────────────────────────────────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cassandrina}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-cassandrina}
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./configs/timescaledb/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    deploy:
      resources:
        limits:
          memory: 1536M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cassandrina}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server /etc/redis/redis.conf
    volumes:
      - ./configs/redis/redis.conf:/etc/redis/redis.conf:ro
    ports:
      - "127.0.0.1:6379:6379"
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Next.js Webapp ─────────────────────────────────────────
  webapp:
    build:
      context: ..
      dockerfile: apps/webapp/Dockerfile
    restart: unless-stopped
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cassandrina}:${POSTGRES_PASSWORD}@timescaledb:5432/${POSTGRES_DB:-cassandrina}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Trading Bot (Python) ───────────────────────────────────
  trading-bot:
    build:
      context: ../services/trading-bot
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cassandrina}:${POSTGRES_PASSWORD}@timescaledb:5432/${POSTGRES_DB:-cassandrina}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Telegram Bot (Go) ──────────────────────────────────────
  telegram-bot:
    build:
      context: ../apps/telegram-bot
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ../.env
    environment:
      REDIS_URL: redis://redis:6379/0
      WEBAPP_API_URL: http://webapp:3000
    depends_on:
      redis:
        condition: service_healthy
      webapp:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 64M

volumes:
  timescaledb_data:
