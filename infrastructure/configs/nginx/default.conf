map $http_upgrade $connection_upgrade {
  default upgrade;
  "" close;
}

resolver 127.0.0.11 ipv6=off valid=30s;

server {
  listen 80;
  server_name _;
  absolute_redirect off;
  set $cassandrina_webapp http://webapp:3000;
  set $rtl_webapp http://rtl:3000;

  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header X-Forwarded-Host $host;

  location = / {
    return 302 /cassandrina;
  }

  location = /cassandrina {
    proxy_pass $cassandrina_webapp;
    proxy_set_header X-Forwarded-Prefix /cassandrina;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }

  location /cassandrina/ {
    proxy_pass $cassandrina_webapp;
    proxy_set_header X-Forwarded-Prefix /cassandrina;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }

  location = /rtl {
    return 302 /rtl/;
  }

  location /rtl/ {
    proxy_pass $rtl_webapp;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }
}
