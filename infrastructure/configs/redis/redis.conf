# Cassandrina Redis Configuration
# Optimized for Raspberry Pi 5 (256 MB limit)

# Memory
maxmemory 200mb
maxmemory-policy allkeys-lru

# Persistence (light — only pub/sub events, not critical)
save ""
appendonly no

# Logging
loglevel notice
logfile ""

# Network
bind 0.0.0.0
protected-mode no

# Pub/sub channels used by Cassandrina:
#   cassandrina:events        — all events (broadcast)
#   cassandrina:prediction:open
#   cassandrina:prediction:close
#   cassandrina:trade:opened
#   cassandrina:trade:closed
#   cassandrina:trade:liquidated
#   cassandrina:stats:8h
#   cassandrina:weekly:vote
